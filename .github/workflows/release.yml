name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check Homebrew tap token
        env:
          GORELEASER_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
        run: |
          test -n "$GORELEASER_GITHUB_TOKEN" || {
            echo "GORELEASER_GITHUB_TOKEN must write to nawwwal/homebrew-whimsies" >&2
            exit 1
          }
      - uses: goreleaser/goreleaser-action@v6
        id: goreleaser
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="mymind_${version}_macos_apple_silicon.tar.gz"
          sha="$(awk -v asset="${archive}" '$2 == asset {print $1}' dist/checksums.txt)"
          test -n "${sha}" || {
            echo "missing checksum for ${archive}" >&2
            exit 1
          }

          work="$(mktemp -d)"
          trap 'rm -rf "${work}"' EXIT
          git clone "https://x-access-token:${GH_TOKEN}@github.com/nawwwal/homebrew-whimsies.git" "${work}/tap"
          mkdir -p "${work}/tap/Formula"
          rm -f "${work}/tap/mymind.rb"
          cat >"${work}/tap/Formula/mymind.rb" <<EOF
          # typed: false
          # frozen_string_literal: true

          # This file is generated by the mymind release workflow. DO NOT EDIT.
          class Mymind < Formula
            desc "Search and use your mymind library from the terminal and AI agents"
            homepage "https://github.com/nawwwal/mymind"
            version "${version}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/nawwwal/mymind/releases/download/${GITHUB_REF_NAME}/${archive}"
                sha256 "${sha}"
              else
                odie "mymind Homebrew releases are Apple Silicon only. Build from source on Intel Mac."
              end
            end

            on_linux do
              odie "mymind Homebrew releases are macOS Apple Silicon only. Build from source on Linux."
            end

            def install
              bin.install "mymind"
              bin.install "mymind-mcp"
            end
          end
          EOF
          ruby -c "${work}/tap/Formula/mymind.rb"
          git -C "${work}/tap" add Formula/mymind.rb
          git -C "${work}/tap" rm -f mymind.rb || true
          if git -C "${work}/tap" diff --cached --quiet; then
            echo "Homebrew tap already up to date."
            exit 0
          fi
          git -C "${work}/tap" -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "Update mymind to ${version}"
          git -C "${work}/tap" push origin main
      - name: Build MCPB bundles
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          rm -rf dist/mcpb
          mkdir -p dist/mcpb
          for target in darwin_arm64_v8.0 windows_amd64_v1; do
            platform="${target%_v*}"
            work="dist/mcpb/${platform}"
            mkdir -p "${work}/bin"
            cp manifest.json "${work}/manifest.json"
            sed -i.bak "s/\"version\": \".*\"/\"version\": \"${version}\"/" "${work}/manifest.json"
            rm "${work}/manifest.json.bak"
            if [[ "${platform}" == windows_* ]]; then
              sed -i.bak 's#bin/mymind-mcp#bin/mymind-mcp.exe#g' "${work}/manifest.json"
              rm "${work}/manifest.json.bak"
              cp "dist/mymind-mcp_${target}/mymind-mcp.exe" "${work}/bin/mymind-mcp.exe"
            else
              cp "dist/mymind-mcp_${target}/mymind-mcp" "${work}/bin/mymind-mcp"
              chmod +x "${work}/bin/mymind-mcp"
            fi
            case "${platform}" in
              darwin_arm64) label="macos_apple_silicon" ;;
              windows_amd64) label="windows_x64" ;;
              *) label="${platform}" ;;
            esac
            (cd "${work}" && zip -qr "../mymind-mcp_${version}_${label}.mcpb" manifest.json bin)
          done
          (cd dist/mcpb && shasum -a 256 *.mcpb > ../mcpb-checksums.txt)
      - name: Upload MCPB bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/mcpb/*.mcpb dist/mcpb-checksums.txt --clobber
      - name: Clean partial release on failure
        if: ${{ failure() && steps.goreleaser.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes --cleanup-tag || true
