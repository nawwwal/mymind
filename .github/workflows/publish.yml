name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @nawwal/mymind to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release tag matches package.json
        if: github.event_name == 'release'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          TAG_VER="${TAG#v}"
          if [ "$VERSION" != "$TAG_VER" ]; then
            echo "::error::package.json version ($VERSION) must match GitHub release tag without v-prefix mismatch (tag=$TAG → expected version $TAG_VER)"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use npm 11
        run: |
          corepack enable
          corepack prepare npm@11.12.1 --activate
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Show npm OIDC environment
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow_ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "--- ~/.npmrc ---"
          cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc)"
          echo "--- ./.npmrc ---"
          cat .npmrc 2>/dev/null || echo "(no project .npmrc)"
          echo "--- npm config registry ---"
          npm config get registry
          echo "--- npm config userconfig ---"
          npm config get userconfig

      # prepublishOnly runs full verify (typecheck, tests, build, manifest/schemas drift, pack:check).
      - name: Publish to npm
        run: npm publish --access public --provenance --loglevel verbose
