version: 2
project_name: mymind
changelog:
  disable: true
builds:
  - id: mymind
    main: ./cmd/mymind
    binary: mymind
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/nawwwal/mymind/internal/cli.version={{ .Version }}
    targets:
      - darwin_arm64
      - windows_amd64
  - id: mymind-mcp
    main: ./cmd/mymind-mcp
    binary: mymind-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_arm64
      - windows_amd64
archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}{{- if and (eq .Os "darwin") (eq .Arch "arm64") -}}_macos_apple_silicon{{- else if and (eq .Os "windows") (eq .Arch "amd64") -}}_windows_x64{{- else -}}_{{ .Os }}_{{ .Arch }}{{- end -}}
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
